    <rect x="378" y="0" width="190" height="56" rx="18" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="473" y="36" text-anchor="middle" class="font" font-size="24" font-weight="700" fill="#15803d">Schema 校验</text>
  </g>

  <g transform="translate(735 142)">
    <rect x="0" y="0" width="382" height="430" rx="30" fill="#0f172a"/>
