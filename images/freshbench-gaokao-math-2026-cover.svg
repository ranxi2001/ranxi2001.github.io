  <rect x="132" y="340" width="520" height="10" rx="5" fill="url(#blue)"/>

  <text x="132" y="408" class="font" font-size="28" font-weight="700" fill="#334155">把刚发布的新题，整理成可复现的 LLM / Agent Benchmark</text>

