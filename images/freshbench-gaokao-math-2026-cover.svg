<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef7ff"/>
      <stop offset="0.52" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eaf2ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#1e3a8a" flood-opacity="0.18"/>
    </filter>
    <style>
      .font { font-family: 'Noto Sans CJK SC', 'Microsoft YaHei', 'PingFang SC', 'WenQuanYi Micro Hei', sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'SFMono-Regular', 'Consolas', monospace; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1070" cy="100" r="220" fill="#dbeafe" opacity="0.7"/>
  <circle cx="180" cy="650" r="260" fill="#ccfbf1" opacity="0.45"/>

  <rect x="82" y="74" width="1116" height="572" rx="38" fill="#ffffff" opacity="0.9" filter="url(#shadow)"/>
