    <circle cx="36" cy="30" r="8" fill="#f87171"/>
    <circle cx="64" cy="30" r="8" fill="#fbbf24"/>
    <circle cx="92" cy="30" r="8" fill="#34d399"/>
    <text x="124" y="38" class="mono" font-size="18" font-weight="700" fill="#cbd5e1">freshbench.jsonl</text>

    <text x="32" y="104" class="mono" font-size="22" fill="#93c5fd">{</text>
