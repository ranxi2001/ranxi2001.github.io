<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.52" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#f4f0ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.55" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#1e293b" flood-opacity="0.16"/>
    </filter>
    <style>
      .font { font-family: 'Noto Sans CJK SC', 'Microsoft YaHei', 'PingFang SC', 'WenQuanYi Micro Hei', sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'SFMono-Regular', 'Consolas', monospace; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="96" r="240" fill="#dbeafe" opacity="0.65"/>
  <circle cx="130" cy="610" r="250" fill="#ede9fe" opacity="0.72"/>
  <circle cx="1010" cy="650" r="170" fill="#ccfbf1" opacity="0.45"/>

  <rect x="70" y="62" width="1140" height="596" rx="40" fill="#ffffff" opacity="0.94" filter="url(#shadow)"/>
  <rect x="70" y="62" width="1140" height="596" rx="40" fill="none" stroke="#dbeafe" stroke-width="2"/>

  <text x="122" y="136" class="mono" font-size="28" font-weight="800" fill="#2563eb">AI Agent Engineering</text>
  <text x="122" y="220" class="font" font-size="66" font-weight="900" fill="#0f172a">Agent Harness</text>
  <text x="122" y="300" class="font" font-size="58" font-weight="900" fill="#0f172a">从 Demo 到工程系统</text>
  <rect x="122" y="332" width="574" height="12" rx="6" fill="url(#accent)"/>
  <text x="122" y="398" class="font" font-size="28" font-weight="700" fill="#334155">Tools · Skills · Memory · Context · Permission · Sub-agent</text>

  <g transform="translate(122 452)">
    <rect x="0" y="0" width="116" height="54" rx="17" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="58" y="35" text-anchor="middle" class="font" font-size="22" font-weight="800" fill="#1d4ed8">Tools</text>
    <rect x="132" y="0" width="116" height="54" rx="17" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="190" y="35" text-anchor="middle" class="font" font-size="22" font-weight="800" fill="#6d28d9">Skills</text>
    <rect x="264" y="0" width="136" height="54" rx="17" fill="#ecfeff" stroke="#a5f3fc"/>
    <text x="332" y="35" text-anchor="middle" class="font" font-size="22" font-weight="800" fill="#0e7490">Memory</text>
    <rect x="416" y="0" width="136" height="54" rx="17" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="484" y="35" text-anchor="middle" class="font" font-size="22" font-weight="800" fill="#15803d">Context</text>
  </g>

  <g transform="translate(744 122)">
    <rect x="0" y="0" width="374" height="454" rx="32" fill="#0f172a"/>
    <rect x="28" y="30" width="318" height="64" rx="18" fill="#1e293b" stroke="#334155"/>
    <text x="187" y="70" text-anchor="middle" class="font" font-size="25" font-weight="800" fill="#ffffff">Agent Runtime</text>

    <line x1="187" y1="96" x2="187" y2="138" stroke="#64748b" stroke-width="3"/>

    <g class="font" font-size="20" font-weight="800">
      <rect x="34" y="138" width="134" height="50" rx="14" fill="#2563eb"/>
      <text x="101" y="170" text-anchor="middle" fill="#ffffff">Query</text>
      <rect x="206" y="138" width="134" height="50" rx="14" fill="#7c3aed"/>
      <text x="273" y="170" text-anchor="middle" fill="#ffffff">Hooks</text>
      <rect x="34" y="218" width="134" height="50" rx="14" fill="#0891b2"/>
      <text x="101" y="250" text-anchor="middle" fill="#ffffff">Session</text>
      <rect x="206" y="218" width="134" height="50" rx="14" fill="#16a34a"/>
      <text x="273" y="250" text-anchor="middle" fill="#ffffff">Safety</text>
      <rect x="34" y="298" width="134" height="50" rx="14" fill="#ea580c"/>
      <text x="101" y="330" text-anchor="middle" fill="#ffffff">Command</text>
      <rect x="206" y="298" width="134" height="50" rx="14" fill="#db2777"/>
      <text x="273" y="330" text-anchor="middle" fill="#ffffff">Sub-agent</text>
    </g>

    <rect x="34" y="382" width="306" height="46" rx="16" fill="#020617" stroke="#334155"/>
    <text x="187" y="412" text-anchor="middle" class="mono" font-size="20" font-weight="800" fill="#93c5fd">Node.js · TypeScript · SQLite</text>
  </g>

  <text x="122" y="594" class="font" font-size="24" font-weight="700" fill="#475569">模型只是大脑，Harness 才是让 Agent 可执行、可恢复、可治理的工程外壳。</text>
</svg>
